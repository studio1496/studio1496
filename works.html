        <main>
            <h2 class="works-title">
                Works
            </h2>
          <div class="gallery" id="gallery">
            <a href="work1.html" class="item">
                <img src="images/image_work1.jpg" loading="lazy" alt="作品1">
                <span class="title">廃墟の構築</span>
            </a>
            <a href="work2.html" class="item">
                <img src="images/image_work2.png" loading="lazy" alt="作品2">
                <span class="title">青山の葬儀場</span>
            </a>
            <a href="work3.html" class="item">
                <img src="images/image_work3.png" loading="lazy" alt="作品3">
                <span class="title">アルルに住むように</span>

            </a>
           </div>

        <script>
        const hamburger = document.getElementById('hamburger');
        const nav = document.getElementById('main-nav');
        const closeBtn = document.getElementById('close-btn');
        hamburger.addEventListener('click', () => {
            nav.classList.toggle('active');
        });
        closeBtn.addEventListener('click', () => {
            nav.classList.remove('active');
        });
        </script>
        <script>
             // ▼ ギャラリーをランダムに並び替える
        const gallery = document.getElementById('gallery');
        const galleryitems = Array.from(gallery.children);

        // Fisher-Yates シャッフル
        for (let i = galleryitems.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [galleryitems[i],galleryitems[j]] = [galleryitems[j], galleryitems[i]];
        }

        // 並び替えた要素を再配置
        galleryitems.forEach(item => gallery.appendChild(item));
        </script>

        <script>
        // Intersection Observer で画面に入ったか検知
        const items = document.querySelectorAll('.gallery .item');

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const title = entry.target.querySelector('.title'); // ← 先に取得

                if (entry.isIntersecting) {
                 // 見えたら1秒後に表示
                    setTimeout(() => {
                        title.classList.add('show');
                 }, 900);
                } else {
                 // 見えなくなったら非表示に戻す
                 title.classList.remove('show');
                }
            });
        }, { threshold: 1 });
        items.forEach(item => observer.observe(item));
        </script>

    </body>
